<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: white; font-family: var(--font-family); padding: 20px 24px; }
  .row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .box { display: flex; align-items: center; justify-content: center; background: #dbeafe; color: #1a56db; font-size: 10px; font-weight: 600; border-radius: 4px; flex-shrink: 0; }
  .label { font-size: 12px; color: #6b7280; }
</style>
</head>
<body>
  <div class="row"><div class="box" style="width:4px;height:16px;"></div><div class="label">space-1 — 4px</div></div>
  <div class="row"><div class="box" style="width:8px;height:16px;"></div><div class="label">space-2 — 8px</div></div>
  <div class="row"><div class="box" style="width:12px;height:16px;"></div><div class="label">space-3 — 12px</div></div>
  <div class="row"><div class="box" style="width:16px;height:16px;"></div><div class="label">space-4 — 16px</div></div>
  <div class="row"><div class="box" style="width:20px;height:16px;"></div><div class="label">space-5 — 20px</div></div>
  <div class="row"><div class="box" style="width:24px;height:16px;"></div><div class="label">space-6 — 24px</div></div>
  <div class="row"><div class="box" style="width:32px;height:16px;"></div><div class="label">space-8 — 32px</div></div>
  <div class="row"><div class="box" style="width:48px;height:16px;"></div><div class="label">space-12 — 48px</div></div>
  <div class="row"><div class="box" style="width:64px;height:16px;"></div><div class="label">space-16 — 64px</div></div>
</body>
</html>
