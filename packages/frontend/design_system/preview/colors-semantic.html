<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--color-bg); font-family: var(--font-family); padding: 16px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; }
  .swatch { border-radius: 8px; overflow: hidden; flex: 1; min-width: 80px; }
  .color-block { height: 64px; }
  .label { padding: 6px 8px; background: white; border: 1px solid #e5e7eb; border-top: none; }
  .name { font-size: 11px; font-weight: 600; color: #111827; }
  .hex  { font-size: 10px; color: #6b7280; }
</style>
</head>
<body>
<div class="row">
  <div class="swatch">
    <div class="color-block" style="background:#0e9f6e;"></div>
    <div class="label"><div class="name">Success</div><div class="hex">#0e9f6e</div></div>
  </div>
  <div class="swatch">
    <div class="color-block" style="background:#d1fae5;"></div>
    <div class="label"><div class="name">Success Lt</div><div class="hex">#d1fae5</div></div>
  </div>
  <div class="swatch">
    <div class="color-block" style="background:#c27803;"></div>
    <div class="label"><div class="name">Warning</div><div class="hex">#c27803</div></div>
  </div>
  <div class="swatch">
    <div class="color-block" style="background:#fef3c7;"></div>
    <div class="label"><div class="name">Warning Lt</div><div class="hex">#fef3c7</div></div>
  </div>
  <div class="swatch">
    <div class="color-block" style="background:#e02424;"></div>
    <div class="label"><div class="name">Danger</div><div class="hex">#e02424</div></div>
  </div>
  <div class="swatch">
    <div class="color-block" style="background:#fee2e2;"></div>
    <div class="label"><div class="name">Danger Lt</div><div class="hex">#fee2e2</div></div>
  </div>
</div>
</body>
</html>
