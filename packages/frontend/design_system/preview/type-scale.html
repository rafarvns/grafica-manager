<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: white; font-family: var(--font-family); padding: 20px 24px; }
  .specimen { margin-bottom: 12px; display: flex; align-items: baseline; gap: 16px; }
  .specimen-text { color: #111827; }
  .meta { font-size: 11px; color: #9ca3af; white-space: nowrap; }
  hr { border: none; border-top: 1px solid #e5e7eb; margin: 12px 0; }
</style>
</head>
<body>
  <div class="specimen">
    <div class="specimen-text" style="font-size:1.875rem;font-weight:700;line-height:1.25;">Título da Página</div>
    <div class="meta">3xl / 700</div>
  </div>
  <div class="specimen">
    <div class="specimen-text" style="font-size:1.5rem;font-weight:700;line-height:1.25;">Seção Principal</div>
    <div class="meta">2xl / 700</div>
  </div>
  <div class="specimen">
    <div class="specimen-text" style="font-size:1.25rem;font-weight:600;line-height:1.25;">Subtítulo de Seção</div>
    <div class="meta">xl / 600</div>
  </div>
  <div class="specimen">
    <div class="specimen-text" style="font-size:1.125rem;font-weight:600;line-height:1.25;">Card Header</div>
    <div class="meta">lg / 600</div>
  </div>
  <hr>
  <div class="specimen">
    <div class="specimen-text" style="font-size:1rem;font-weight:400;line-height:1.5;">Texto de corpo padrão — informações detalhadas do pedido.</div>
    <div class="meta">base / 400</div>
  </div>
  <div class="specimen">
    <div class="specimen-text" style="font-size:0.875rem;font-weight:400;color:#6b7280;line-height:1.5;">Texto auxiliar e labels de formulários</div>
    <div class="meta">sm / 400</div>
  </div>
  <div class="specimen">
    <div class="specimen-text" style="font-size:0.75rem;font-weight:500;color:#6b7280;letter-spacing:0.05em;text-transform:uppercase;">Cabeçalho de Tabela</div>
    <div class="meta">xs / 500 uppercase</div>
  </div>
</body>
</html>
