<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--color-bg); font-family: var(--font-family); padding: 16px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; }
  .swatch { border-radius: 8px; overflow: hidden; flex: 1; min-width: 80px; }
  .color-block { height: 64px; }
  .label { padding: 6px 8px; border-top: 1px solid rgba(255,255,255,0.1); }
  .name { font-size: 11px; font-weight: 600; }
  .hex  { font-size: 10px; opacity: 0.7; }
</style>
</head>
<body>
<div class="row">
  <div class="swatch">
    <div class="color-block" style="background:#1e2433;"></div>
    <div class="label" style="background:#1e2433;color:#c9d1e0;"><div class="name">Sidebar BG</div><div class="hex">#1e2433</div></div>
  </div>
  <div class="swatch">
    <div class="color-block" style="background:#c9d1e0;"></div>
    <div class="label" style="background:#c9d1e0;color:#1e2433;"><div class="name">Sidebar Text</div><div class="hex">#c9d1e0</div></div>
  </div>
  <div class="swatch">
    <div class="color-block" style="background:#1a56db;"></div>
    <div class="label" style="background:#1a56db;color:white;"><div class="name">Active BG</div><div class="hex">#1a56db</div></div>
  </div>
  <div class="swatch">
    <div class="color-block" style="background:white;border:1px solid #e5e7eb;"></div>
    <div class="label" style="background:#1e2433;color:white;"><div class="name">Active Text</div><div class="hex">#ffffff</div></div>
  </div>
</div>
</body>
</html>
