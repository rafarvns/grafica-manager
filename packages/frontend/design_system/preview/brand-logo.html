<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #f3f4f6; font-family: var(--font-family); padding: 20px; display: flex; gap: 24px; align-items: center; }
  .logo-bg { background: white; border-radius: 16px; padding: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 3px rgb(0 0 0/0.1); }
  img { display: block; }
  .dark-bg { background: #1e2433; border-radius: 16px; padding: 20px; }
</style>
</head>
<body>
  <div class="logo-bg">
    <img src="../assets/logo-color.png" width="120" height="120" alt="Arte Papel logo color" />
  </div>
  <div class="logo-bg">
    <img src="../assets/logo-bw.png" width="120" height="120" alt="Arte Papel logo B&W" />
  </div>
  <div class="dark-bg">
    <img src="../assets/logo-bw.png" width="120" height="120" alt="Arte Papel logo on dark" style="filter:invert(1) brightness(2);" />
  </div>
</body>
</html>
