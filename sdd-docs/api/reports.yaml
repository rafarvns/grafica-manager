openapi: 3.0.3
info:
  title: Gráfica Manager — Reports API
  version: 1.1.0
  description: Endpoints de relatórios detalhados (spec 0024)

servers:
  - url: http://localhost:3333/api/v1

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    ReportRow:
      type: object
      required: [orderId, orderNumber, customerName, paperType, quantity, salePrice, cost, margin, marginPercent, date, origin]
      properties:
        orderId:
          type: string
        orderNumber:
          type: string
        customerId:
          type: string
        customerName:
          type: string
        paperType:
          type: string
        quantity:
          type: integer
        salePrice:
          type: number
        cost:
          type: number
        margin:
          type: number
        marginPercent:
          type: number
        date:
          type: string
          format: date-time
        origin:
          type: string
          enum: [SHOPEE, MANUAL]

    ReportTotals:
      type: object
      required: [totalOrders, totalQuantity, totalCost, totalRevenue, totalMargin, marginPercent, ticketAverage]
      properties:
        totalOrders:
          type: integer
        totalQuantity:
          type: integer
        totalCost:
          type: number
        totalRevenue:
          type: number
        totalMargin:
          type: number
        marginPercent:
          type: number
        ticketAverage:
          type: number

    ReportResult:
      type: object
      required: [rows, totals, pagination]
      properties:
        rows:
          type: array
          items:
            $ref: '#/components/schemas/ReportRow'
        totals:
          $ref: '#/components/schemas/ReportTotals'
        pagination:
          type: object
          properties:
            page:
              type: integer
            pageSize:
              type: integer
            totalCount:
              type: integer

    OrderStatus:
      type: string
      enum: [draft, scheduled, in_production, completed, shipping, cancelled]

    ReportFilters:
      type: object
      required: [startDate, endDate]
      properties:
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        customerIds:
          type: array
          items:
            type: string
        paperTypeIds:
          type: array
          items:
            type: string
        origin:
          type: array
          items:
            type: string
            enum: [SHOPEE, MANUAL]
        statuses:
          type: array
          items:
            $ref: '#/components/schemas/OrderStatus'

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

paths:
  /reports/generate:
    get:
      summary: Gerar relatório com filtros
      description: >
        Retorna dados do relatório. Período obrigatório (máximo 1 ano).
        Retorna JSON streaming para grandes datasets.
      parameters:
        - in: query
          name: startDate
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: endDate
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: customerIds
          schema:
            type: array
            items:
              type: string
            style: form
            explode: false
        - in: query
          name: paperTypeIds
          schema:
            type: array
            items:
              type: string
            style: form
            explode: false
        - in: query
          name: origin
          schema:
            type: array
            items:
              type: string
              enum: [SHOPEE, MANUAL]
            style: form
            explode: false
        - in: query
          name: statuses
          schema:
            type: array
            items:
              $ref: '#/components/schemas/OrderStatus'
            style: form
            explode: false
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Relatório gerado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResult'
        '400':
          description: Erro de validação (ex: período > 1 ano)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /reports/export:
    post:
      summary: Exportar relatório em múltiplos formatos
      description: Gera e baixa o relatório em formato CSV, PDF ou Excel.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filters, format]
              properties:
                filters:
                  $ref: '#/components/schemas/ReportFilters'
                format:
                  type: string
                  enum: [csv, pdf, xlsx]
                grouping:
                  type: string
                  enum: [none, customer, order, paper, origin]
                  default: none
      responses:
        '200':
          description: Arquivo para download
          headers:
            Content-Disposition:
              schema:
                type: string
                example: attachment; filename="report.pdf"
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          description: Parâmetros inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
